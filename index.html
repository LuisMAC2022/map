<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Loop PET · Mapa interactivo FES Acatlán</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <a class="skip-link" href="#main-content">Saltar al contenido principal</a>

  <div class="app-shell">
    <main id="main-content" class="map-stage" aria-label="Mapa interactivo de FES Acatlán">
      <div id="stage" aria-live="polite"></div>
    </main>

    <aside class="control-panel" aria-label="Panel de control y progreso PET">
      <header>
        <h1>Loop jugable PET</h1>
        <p>Explora el mapa y recolecta fragmentos educativos al tocar contenedores PET.</p>
      </header>

      <section aria-labelledby="search-title">
        <h2 id="search-title">Búsqueda y filtro</h2>
        <label for="search">Buscar contenedor</label>
        <input id="search" type="search" placeholder="Ej. contenedor 1">
      </section>

      <section aria-labelledby="filters-title">
        <h2 id="filters-title">Categorías</h2>
        <div id="filters" class="filter-list"></div>
      </section>

      <section aria-labelledby="progress-title">
        <h2 id="progress-title">Progreso</h2>
        <div id="progress-panel" class="info-card"></div>
        <button id="reset-game" type="button">Reiniciar progreso</button>
      </section>

      <section aria-labelledby="info-title">
        <h2 id="info-title">Detalle del contenedor</h2>
        <div id="info" class="info-card"></div>
      </section>

      <section aria-labelledby="results-title">
        <h2 id="results-title">Resultados</h2>
        <div id="results" class="result-list"></div>
      </section>

      <section aria-labelledby="minigame-title">
        <h2 id="minigame-title">Minijuego</h2>
        <div class="info-card" id="minigame-placeholder">Minijuego en desarrollo.</div>
      </section>

      <div id="notif" class="notification" role="status" aria-live="polite"></div>
    </aside>
  </div>

  <script type="module" src="game.js"></script>
</body>
</html>
