<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Mapa interactivo FES Acatlán - MVP</title>
  <style>
    :root {
      --panel: #ffffff;
      --ink: #1f2937;
      --muted: #6b7280;
      --line: #d1d5db;
      --surface: #f3f4f6;
      --accent: #111827;
      --marker: #111827;
      --marker-active: #000000;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--ink);
      background: var(--surface);
    }

    app-shell {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 340px;
      min-height: 100vh;
    }

    map-stage {
      position: relative;
      display: grid;
      place-items: center;
      overflow: auto;
      padding: 1rem;
      background:
        linear-gradient(45deg, #e5e7eb 25%, transparent 25%),
        linear-gradient(-45deg, #e5e7eb 25%, transparent 25%),
        linear-gradient(45deg, transparent 75%, #e5e7eb 75%),
        linear-gradient(-45deg, transparent 75%, #e5e7eb 75%);
      background-size: 24px 24px;
      background-position: 0 0, 0 12px, 12px -12px, -12px 0;
    }

    map-stage svg {
      width: min(100%, 1180px);
      height: auto;
      max-height: calc(100vh - 2rem);
      background: white;
      border: 1px solid var(--line);
      box-shadow: 0 10px 28px rgba(0,0,0,.12);
      touch-action: manipulation;
    }

    control-panel {
      display: flex;
      flex-direction: column;
      gap: .75rem;
      padding: 1rem;
      background: var(--panel);
      border-left: 1px solid var(--line);
      overflow: auto;
      max-height: 100vh;
    }

    h1 {
      margin: 0;
      font-size: 1.1rem;
      line-height: 1.2;
    }

    p {
      margin: 0;
      color: var(--muted);
      line-height: 1.4;
    }

    label {
      display: grid;
      gap: .35rem;
      font-size: .9rem;
      font-weight: 650;
    }

    input, select, button {
      font: inherit;
      border: 1px solid var(--line);
      border-radius: .6rem;
      padding: .65rem .75rem;
      background: white;
    }

    button {
      cursor: pointer;
    }

    button[data-active="true"] {
      background: var(--accent);
      color: white;
      border-color: var(--accent);
    }

    filter-list {
      display: flex;
      flex-wrap: wrap;
      gap: .5rem;
    }

    result-list {
      display: grid;
      gap: .5rem;
    }

    result-card {
      display: grid;
      gap: .2rem;
      border: 1px solid var(--line);
      border-radius: .75rem;
      padding: .75rem;
      background: #fff;
      cursor: pointer;
    }

    result-card:hover,
    result-card[data-active="true"] {
      outline: 2px solid #111827;
      outline-offset: 1px;
    }

    result-card strong {
      font-size: .95rem;
    }

    result-card span {
      color: var(--muted);
      font-size: .85rem;
    }

    info-card {
      display: grid;
      gap: .35rem;
      border: 1px solid var(--line);
      border-radius: .75rem;
      padding: .8rem;
      background: #f9fafb;
      min-height: 6rem;
    }

    .marker {
      cursor: pointer;
    }

    .marker circle {
      fill: var(--marker);
      stroke: white;
      stroke-width: 4;
      vector-effect: non-scaling-stroke;
    }

    .marker text {
      font: 700 28px system-ui, sans-serif;
      fill: white;
      text-anchor: middle;
      dominant-baseline: central;
      pointer-events: none;
    }

    .marker[data-active="true"] circle {
      fill: var(--marker-active);
      stroke: #fbbf24;
      stroke-width: 7;
    }

    .marker[data-hidden="true"] {
      display: none;
    }

    @media (max-width: 840px) {
      app-shell {
        grid-template-columns: 1fr;
        grid-template-rows: 58vh auto;
      }

      map-stage {
        padding: .5rem;
      }

      map-stage svg {
        width: 100%;
        max-height: 56vh;
      }

      control-panel {
        max-height: none;
        border-left: 0;
        border-top: 1px solid var(--line);
      }
    }
  </style>
</head>
<body>
  <app-shell>
    <map-stage id="stage" aria-label="Mapa interactivo"></map-stage>

    <control-panel>
      <header>
        <h1>Mapa interactivo FES Acatlán</h1>
        <p>MVP técnico: carga SVG, lee puntos JSON, filtra, busca y muestra ficha.</p>
      </header>

      <label>
        Buscar punto
        <input id="search" type="search" placeholder="Ej. baño, PET, laboratorio, punto 1">
      </label>

      <section>
        <p>Categorías</p>
        <filter-list id="filters"></filter-list>
      </section>

      <info-card id="info">
        <strong>Selecciona un punto</strong>
        <p>Haz clic en un marcador del mapa o en un resultado de la lista.</p>
      </info-card>

      <section>
        <p>Resultados</p>
        <result-list id="results"></result-list>
      </section>
    </control-panel>
  </app-shell>

  <script>
    const SVG_FILE = "mapa_vectorizado.svg";
    const POINTS_FILE = "puntos.json";

    const stage = document.querySelector("#stage");
    const search = document.querySelector("#search");
    const filters = document.querySelector("#filters");
    const results = document.querySelector("#results");
    const info = document.querySelector("#info");

    let svg;
    let markerLayer;
    let points = [];
    let activeCategory = "todas";
    let activePointId = null;

    start().catch(error => {
      stage.textContent = "No se pudo cargar el mapa. Sirve esta carpeta con un servidor local, por ejemplo: python3 -m http.server";
      console.error(error);
    });

    async function start() {
      const [svgText, loadedPoints] = await Promise.all([
        fetch(SVG_FILE).then(response => response.text()),
        fetch(POINTS_FILE).then(response => response.json())
      ]);

      points = normalizePoints(loadedPoints);

      const doc = new DOMParser().parseFromString(svgText, "image/svg+xml");
      svg = doc.documentElement;

      ensureViewBox(svg);
      svg.setAttribute("role", "img");
      svg.setAttribute("aria-label", "Mapa simplificado de FES Acatlán");
      svg.removeAttribute("width");
      svg.removeAttribute("height");

      markerLayer = document.createElementNS("http://www.w3.org/2000/svg", "g");
      markerLayer.setAttribute("id", "poi-markers");
      svg.appendChild(markerLayer);

      stage.replaceChildren(svg);

      renderFilters();
      renderMarkers();
      renderResults();

      search.addEventListener("input", () => {
        renderMarkers();
        renderResults();
      });
    }

    function normalizePoints(rawPoints) {
      return rawPoints.map((point, index) => ({
        id: String(point.id || `punto-${index + 1}`),
        nombre: String(point.nombre || point.name || `Punto ${index + 1}`),
        categoria: String(point.categoria || point.type || "sin_clasificar"),
        x: Number(point.x),
        y: Number(point.y),
        descripcion: String(point.descripcion || point.description || ""),
        edificio: point.edificio || point.building || "",
        piso: point.piso || point.floor || "",
        tags: Array.isArray(point.tags) ? point.tags.map(String) : []
      })).filter(point => Number.isFinite(point.x) && Number.isFinite(point.y));
    }

    function ensureViewBox(svgElement) {
      if (svgElement.hasAttribute("viewBox")) return;

      const width = parseFloat(svgElement.getAttribute("width"));
      const height = parseFloat(svgElement.getAttribute("height"));

      if (Number.isFinite(width) && Number.isFinite(height)) {
        svgElement.setAttribute("viewBox", `0 0 ${width} ${height}`);
      }
    }

    function renderFilters() {
      const categories = ["todas", ...new Set(points.map(point => point.categoria))];

      filters.replaceChildren(...categories.map(category => {
        const button = document.createElement("button");
        button.type = "button";
        button.textContent = category.replaceAll("_", " ");
        button.dataset.active = String(category === activeCategory);

        button.addEventListener("click", () => {
          activeCategory = category;
          [...filters.children].forEach(child => child.dataset.active = "false");
          button.dataset.active = "true";
          renderMarkers();
          renderResults();
        });

        return button;
      }));
    }

    function renderMarkers() {
      markerLayer.replaceChildren();

      for (const point of points) {
        if (!matches(point)) continue;

        const marker = document.createElementNS("http://www.w3.org/2000/svg", "g");
        marker.classList.add("marker");
        marker.dataset.id = point.id;
        marker.dataset.active = String(point.id === activePointId);
        marker.setAttribute("transform", `translate(${point.x} ${point.y})`);
        marker.setAttribute("tabindex", "0");
        marker.setAttribute("role", "button");
        marker.setAttribute("aria-label", point.nombre);

        const circle = document.createElementNS("http://www.w3.org/2000/svg", "circle");
        circle.setAttribute("r", "22");

        const text = document.createElementNS("http://www.w3.org/2000/svg", "text");
        text.textContent = iconFor(point.categoria);

        marker.append(circle, text);

        marker.addEventListener("click", () => selectPoint(point.id));
        marker.addEventListener("keydown", event => {
          if (event.key === "Enter" || event.key === " ") {
            event.preventDefault();
            selectPoint(point.id);
          }
        });

        markerLayer.appendChild(marker);
      }
    }

    function renderResults() {
      const visible = points.filter(matches);

      results.replaceChildren(...visible.map(point => {
        const card = document.createElement("result-card");
        card.dataset.active = String(point.id === activePointId);
        card.innerHTML = `
          <strong>${escapeHTML(point.nombre)}</strong>
          <span>${escapeHTML(point.categoria.replaceAll("_", " "))} · x:${point.x}, y:${point.y}</span>
        `;
        card.addEventListener("click", () => selectPoint(point.id));
        return card;
      }));
    }

    function selectPoint(id) {
      activePointId = id;
      const point = points.find(candidate => candidate.id === id);
      if (!point) return;

      info.innerHTML = `
        <strong>${escapeHTML(point.nombre)}</strong>
        <p><b>Categoría:</b> ${escapeHTML(point.categoria.replaceAll("_", " "))}</p>
        ${point.edificio ? `<p><b>Edificio:</b> ${escapeHTML(point.edificio)}</p>` : ""}
        ${point.piso ? `<p><b>Piso/zona:</b> ${escapeHTML(point.piso)}</p>` : ""}
        ${point.descripcion ? `<p>${escapeHTML(point.descripcion)}</p>` : "<p>Falta descripción humana del punto.</p>"}
        <p><b>Coordenadas SVG:</b> ${point.x}, ${point.y}</p>
      `;

      renderMarkers();
      renderResults();

      const marker = markerLayer.querySelector(`[data-id="${CSS.escape(id)}"]`);
      marker?.scrollIntoView({ block: "center", inline: "center", behavior: "smooth" });
    }

    function matches(point) {
      const q = search.value.trim().toLowerCase();

      const byCategory = activeCategory === "todas" || point.categoria === activeCategory;
      if (!byCategory) return false;

      if (!q) return true;

      const haystack = [
        point.id,
        point.nombre,
        point.categoria,
        point.descripcion,
        point.edificio,
        point.piso,
        ...point.tags
      ].join(" ").toLowerCase();

      return haystack.includes(q);
    }

    function iconFor(category) {
      const icons = {
        sanitario: "WC",
        bebedero: "A",
        recoleccion_pet: "P",
        laboratorio: "L",
        salon: "S",
        entrada: "E",
        emergencia: "!",
        sin_clasificar: "?"
      };

      return icons[category] || "•";
    }

    function escapeHTML(value) {
      return String(value).replace(/[&<>"']/g, char => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#39;"
      }[char]));
    }
  </script>
</body>
</html>
